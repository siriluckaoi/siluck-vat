<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAT Checker Pro</title>

<style>
  body {
    font-family: "Prompt", sans-serif;
    background: #f6f8fb;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  .card {
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 20px;
  }

  h2 {
    margin-bottom: 15px;
  }

  label {
    font-size: 14px;
    color: #555;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
  }

  .result {
    background: #f1f5f9;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
  }

  .success {
    color: #16a34a;
    font-weight: bold;
  }

  .error {
    color: #dc2626;
    font-weight: bold;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">🔍 VAT Checker Pro</div>

    <label>ราคาที่รวม VAT แล้ว</label>
    <input type="number" id="gross" placeholder="เช่น 107.00" step="0.01">

    <label>VAT (%)</label>
    <input type="number" id="vat" value="7">

    <div id="result" class="result">
      กรอกข้อมูลเพื่อเริ่มคำนวณ...
    </div>
  </div>

</div>

<script>
const grossInput = document.getElementById("gross");
const vatInput = document.getElementById("vat");
const resultDiv = document.getElementById("result");

function calculate() {
  const gross = parseFloat(grossInput.value);
  const vatRate = parseFloat(vatInput.value);

  if (isNaN(gross) || isNaN(vatRate)) {
    resultDiv.innerHTML = "กรอกข้อมูลเพื่อเริ่มคำนวณ...";
    return;
  }

  const divisor = 1 + (vatRate / 100);

  const net = gross / divisor;
  const vat = gross - net;
  const grossBack = net * divisor;

  const diff = Math.abs(gross - grossBack);

  const netFix = net.toFixed(2);
  const vatFix = vat.toFixed(2);
  const grossFix = gross.toFixed(2);
  const grossBackFix = grossBack.toFixed(2);

  let status = "";
  if (diff < 0.01) {
    status = `<div class="success">✅ ถูกต้อง</div>`;
  } else {
    status = `<div class="error">❌ คลาดเคลื่อน ${diff.toFixed(4)}</div>`;
  }

  resultDiv.innerHTML = `
    <b>ราคาเดิม:</b> ${grossFix} บาท<br>
    <b>ราคาไม่รวม VAT:</b> ${netFix} บาท<br>
    <b>VAT:</b> ${vatFix} บาท<br>
    <b>คำนวณกลับ:</b> ${grossBackFix} บาท<br><br>
    ${status}
  `;
}

// Realtime
grossInput.addEventListener("input", calculate);
vatInput.addEventListener("input", calculate);
</script>

</body>
</html>
