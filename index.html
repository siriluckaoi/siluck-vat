<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>คำนวณ VAT + หัก ณ ที่จ่าย — (◉●•◦Siluck◦•●◉)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --gap:14px; --radius:14px;
      --green:#166534; --green-100:#e6f7e6; --green-200:#cfe6cf; --green-700:#134e13;
      --gray:#f1f1f1; --gray-border:#cfcfcf;
      --fs-xs:12.5px; --fs-sm:14px; --fs-md:16px; --fs-lg:18px; --fs-xl:22px;
    }
    body{font-family:"Inter","Noto Sans Thai",sans-serif;margin:0;background:#f7f7fb;color:#1f2328;}
    header{background:#fff;border-bottom:1px solid #eee;padding:16px;}
    h1{font-size:var(--fs-xl);margin:0;}
    .wrap{max-width:1100px;margin:auto;padding:18px;}
    .zone{background:#fff;border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.06);margin-bottom:18px;}
    .zone-head{background:#fff3cd;padding:12px 16px;font-weight:600;}
    .zone-body{padding:16px;}
    .zone-grid{display:grid;gap:16px;}
    @media(min-width:900px){.zone-grid{grid-template-columns:1.1fr .9fr;}}
    input,select{width:100%;padding:11px;border-radius:10px;border:1px solid #ccc;}
    .btn{width:100%;padding:11px;border-radius:999px;background:var(--green);color:#fff;border:none;}
    .stack{display:grid;gap:12px;}
    .result{border:2px solid var(--green-100);padding:16px;border-radius:var(--radius);}
    .row{display:flex;justify-content:space-between;padding:6px 0;}
    .highlight{background:var(--green-100);padding:10px;border-radius:10px;font-weight:bold;}
    .detail{margin-top:10px;border:1px dashed var(--green);padding:10px;border-radius:10px;font-size:13px;}
    footer{text-align:center;color:#666;font-size:12px;margin:20px;}
  </style>
</head>

<body>
<header>
  <h1>คำนวณ VAT และหัก ณ ที่จ่าย ◉●•◦Siluck◦•●◉</h1>
</header>

<div class="wrap">

<!-- ====== ของเดิม ====== -->
<section class="zone">
  <div class="zone-head">คำนวณ VAT + หัก ณ ที่จ่าย</div>
  <div class="zone-body">
    <div class="zone-grid">
      <div class="stack">
        <input id="amount" type="number" placeholder="ยอดก่อน VAT">
        <input id="vat_rate" type="number" value="7">
        <input id="wht_rate" type="number" value="3">
        <button class="btn" onclick="calc()">คำนวณ</button>
      </div>
      <aside class="result">
        <div class="row"><div>รวม VAT</div><div id="out_gross">—</div></div>
        <div class="row"><div>ยอดสุทธิ</div><div id="out_net">—</div></div>
      </aside>
    </div>
  </div>
</section>

<section class="zone">
  <div class="zone-head">ถอด VAT จากยอด VAT</div>
  <div class="zone-body">
    <div class="zone-grid">
      <div class="stack">
        <input id="vat_known" type="number" placeholder="VAT">
        <input id="vat_rate_known" type="number" value="7">
        <button class="btn" onclick="calc2()">คำนวณ</button>
      </div>
      <aside class="result">
        <div class="row"><div>ฐาน</div><div id="out_base2">—</div></div>
        <div class="row"><div>รวม</div><div id="out_gross2">—</div></div>
      </aside>
    </div>
  </div>
</section>

<!-- ====== 🔥 Zone ใหม่ ====== -->
<section class="zone">
  <div class="zone-head">🔍 ตรวจสอบ VAT ย้อนกลับ (Realtime Pro)</div>
  <div class="zone-body">
    <div class="zone-grid">
      
      <div class="stack">
        <input id="check_gross" type="number" placeholder="ราคาที่รวม VAT แล้ว">
        <input id="check_vat" type="number" value="7">
      </div>

      <aside class="result">
        <div class="row"><div>ราคาเดิม</div><div id="c_gross">—</div></div>
        <div class="row"><div>ไม่รวม VAT</div><div id="c_net">—</div></div>
        <div class="row"><div>VAT</div><div id="c_vat">—</div></div>
        <div class="row"><div>คำนวณกลับ</div><div id="c_back">—</div></div>

        <div id="c_status" class="highlight">—</div>
        <div id="c_detail" class="detail"></div>
      </aside>

    </div>
  </div>
</section>

<footer>creat by : Siluck</footer>
</div>

<script>
const fmt = n => isFinite(n) ? n.toLocaleString('th-TH',{maximumFractionDigits:2}) : '—';

/* ===== เดิม ===== */
function calc(){
  const a=Number(amount.value||0),
        v=Number(vat_rate.value||0)/100,
        w=Number(wht_rate.value||0)/100;
  const gross=a*(1+v), net=gross-(a*w);
  out_gross.textContent=fmt(gross);
  out_net.textContent=fmt(net);
}

function calc2(){
  const VAT=Number(vat_known.value||0),
        r=Number(vat_rate_known.value||0)/100;
  const base=VAT/r, gross=base+VAT;
  out_base2.textContent=fmt(base);
  out_gross2.textContent=fmt(gross);
}

/* ===== 🔥 Realtime Check ===== */
const g=document.getElementById("check_gross");
const v=document.getElementById("check_vat");

function check(){
  const gross=parseFloat(g.value);
  const rate=parseFloat(v.value);

  if(isNaN(gross)||isNaN(rate)||rate<=0){
    c_status.innerHTML="กรอกข้อมูล";
    return;
  }

  const div=1+(rate/100);
  const net=gross/div;
  const vat=gross-net;
  const back=net*div;
  const diff=Math.abs(gross-back);

  c_gross.textContent=fmt(gross);
  c_net.textContent=fmt(net);
  c_vat.textContent=fmt(vat);
  c_back.textContent=fmt(back);

  if(diff<0.01){
    c_status.innerHTML="✅ ถูกต้อง";
  }else{
    c_status.innerHTML="❌ คลาดเคลื่อน "+diff.toFixed(4);
  }

  c_detail.innerHTML=`
    ไม่รวม VAT = ${fmt(gross)} ÷ ${(div).toFixed(4)}<br>
    VAT = ${fmt(gross)} - ${fmt(net)}<br>
    คำนวณกลับ = ${fmt(net)} × ${(div).toFixed(4)}<br>
    Diff = ${diff.toFixed(6)}
  `;
}

g.addEventListener("input",check);
v.addEventListener("input",check);
</script>

</body>
</html>
