<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>คำนวณ VAT + หัก ณ ที่จ่าย — (◉●•◦Siluck◦•●◉)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --gap:14px; --radius:14px;
      --green:#166534; --green-100:#e6f7e6; --green-200:#cfe6cf; --green-700:#134e13;
      --gray:#f1f1f1; --gray-border:#cfcfcf;
      --fs-xs:12.5px; --fs-sm:14px; --fs-md:16px; --fs-lg:18px; --fs-xl:22px;
    }
    body{font-family:"Inter","Noto Sans Thai",sans-serif;margin:0;background:#f7f7fb;color:#1f2328;}
    header{background:#fff;border-bottom:1px solid #eee;padding:16px;}
    h1{font-size:var(--fs-xl);margin:0;}
    .wrap{max-width:1100px;margin:0 auto;padding:18px;}
    .zone{background:#fff;border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.06);margin-bottom:18px;}
    .zone-head{background:#fff3cd;padding:12px 16px;font-weight:600;}
    .zone-body{padding:16px;}
    .zone-grid{display:grid;gap:16px;}
    @media(min-width:900px){.zone-grid{grid-template-columns:1.1fr .9fr;}}
    input,select{width:100%;padding:11px;border-radius:10px;border:1px solid #ccc;}
    .btn{width:100%;padding:11px;border-radius:999px;background:var(--green);color:#fff;border:none;}
    .stack{display:grid;gap:12px;}
    .result{border:2px solid var(--green-100);border-radius:14px;padding:16px;}
    .row{display:flex;justify-content:space-between;margin:6px 0;}
    .highlight{background:var(--green-100);padding:10px;border-radius:10px;font-weight:bold;}
    .detail{margin-top:10px;border:1px dashed var(--green);padding:10px;border-radius:10px;font-size:13px;}
    .notice{background:#f1f1f1;padding:10px;border-radius:10px;font-size:13px;}
  </style>
</head>

<body>
<header>
  <h1>คำนวณ VAT + หัก ณ ที่จ่าย ◉●•◦Siluck◦•●◉</h1>
</header>

<div class="wrap">

<!-- ===== Zone 1 ===== -->
<section class="zone">
  <div class="zone-head">คำนวณ VAT + หัก ณ ที่จ่าย</div>
  <div class="zone-body zone-grid">
    <div class="stack">
      <input id="amount" type="number" placeholder="ยอดก่อน VAT">
      <input id="vat_rate" type="number" value="7">
      <input id="wht_rate" type="number" value="3">
      <button class="btn" id="calc">คำนวณ</button>
      <div id="calc_detail" class="detail"></div>
    </div>

    <aside class="result">
      <div class="row"><div>ฐาน</div><div id="out_base">—</div></div>
      <div class="row"><div>VAT</div><div id="out_vat">—</div></div>
      <div class="row"><div>รวม</div><div id="out_gross">—</div></div>
      <div class="row"><div>WHT</div><div id="out_wht">—</div></div>
      <div class="highlight"><div>สุทธิ</div><div id="out_net">—</div></div>
    </aside>
  </div>
</section>

<!-- ===== Zone 2 ===== -->
<section class="zone">
  <div class="zone-head">ถอด VAT</div>
  <div class="zone-body zone-grid">
    <div class="stack">
      <input id="vat_known" type="number" placeholder="VAT">
      <input id="vat_rate_known" type="number" value="7">
      <button class="btn" id="calc_from_vat">คำนวณ</button>
    </div>

    <aside class="result">
      <div class="row"><div>ฐาน</div><div id="out_base_from_vat">—</div></div>
      <div class="row"><div>รวม</div><div id="out_gross_from_vat">—</div></div>
    </aside>
  </div>
</section>

<!-- ===== 🔥 Zone 3 PRO CHECK ===== -->
<section class="zone">
  <div class="zone-head">🔍 ตรวจสอบ VAT ย้อนกลับ (Realtime PRO)</div>
  <div class="zone-body zone-grid">

    <div class="stack">
      <input id="check_gross" type="number" placeholder="ราคาที่รวม VAT แล้ว เช่น 107.00">
      <input id="check_vat" type="number" value="7">
      <div class="notice">พิมพ์ปุ๊บ ระบบจะตรวจสอบให้ทันที</div>
    </div>

    <aside class="result">
      <div class="row"><div>ราคาเดิม</div><div id="c_gross">—</div></div>
      <div class="row"><div>ไม่รวม VAT</div><div id="c_net">—</div></div>
      <div class="row"><div>VAT</div><div id="c_vat">—</div></div>
      <div class="row"><div>คำนวณกลับ</div><div id="c_back">—</div></div>
      <div class="highlight"><div>สถานะ</div><div id="c_status">—</div></div>
      <div id="c_detail" class="detail"></div>
    </aside>

  </div>
</section>

</div>

<script>
const fmt = n => isFinite(n) ? n.toLocaleString('th-TH',{maximumFractionDigits:2}) : '—';

/* ===== Zone 1 ===== */
calc.onclick=()=>{
  const a=+amount.value||0,
        v=+vat_rate.value/100,
        w=+wht_rate.value/100;
  const vat=a*v, gross=a+vat, wht=a*w, net=gross-wht;

  out_base.textContent=fmt(a);
  out_vat.textContent=fmt(vat);
  out_gross.textContent=fmt(gross);
  out_wht.textContent=fmt(wht);
  out_net.textContent=fmt(net);

  calc_detail.innerHTML=`
  VAT = ${fmt(a)} × ${(v*100)}% = ${fmt(vat)}<br>
  รวม = ${fmt(a)} + ${fmt(vat)} = ${fmt(gross)}<br>
  WHT = ${fmt(a)} × ${(w*100)}% = ${fmt(wht)}<br>
  สุทธิ = ${fmt(gross)} - ${fmt(wht)} = ${fmt(net)}
  `;
};

/* ===== Zone 2 ===== */
calc_from_vat.onclick=()=>{
  const VAT=+vat_known.value||0,
        r=+vat_rate_known.value/100;
  const base=VAT/r, gross=base+VAT;

  out_base_from_vat.textContent=fmt(base);
  out_gross_from_vat.textContent=fmt(gross);
};

/* ===== 🔥 Zone 3 PRO ===== */
const cg=check_gross, cv=check_vat;

function check(){
  const gross=+cg.value;
  const rate=+cv.value/100;

  if(!gross||!rate){
    c_status.textContent="—";
    return;
  }

  const net=gross/(1+rate);
  const vat=gross-net;
  const back=net*(1+rate);
  const diff=Math.abs(gross-back);

  c_gross.textContent=fmt(gross);
  c_net.textContent=fmt(net);
  c_vat.textContent=fmt(vat);
  c_back.textContent=fmt(back);

  c_status.innerHTML=diff<0.01 ? "✅ ถูกต้อง" : "❌ คลาดเคลื่อน "+diff.toFixed(4);

  c_detail.innerHTML=`
  ตรวจสอบ: ${fmt(net)} × (1+${(rate*100)}%) = ${fmt(back)}<br>
  Diff = ${diff.toFixed(6)}
  `;
}

cg.addEventListener("input",check);
cv.addEventListener("input",check);
</script>

</body>
</html>
